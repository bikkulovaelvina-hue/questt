<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Тайна старой школы — квест</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            color: #e2e8f0;
            touch-action: manipulation;
        }
        @media (max-width: 768px) {
            .start-card { width: 95% !important; padding: 1.2rem !important; }
            .start-card h1 { font-size: 1.4rem !important; }
            .role-buttons { gap: 8px !important; }
            .role-btn { padding: 8px 12px !important; font-size: 0.8rem !important; }
            .form-group input { padding: 8px !important; font-size: 0.85rem !important; }
            button { padding: 10px 16px !important; font-size: 0.9rem !important; }
            .dialog-panel, .teacher-panel { padding: 12px !important; }
            .speaker-avatar { width: 35px !important; height: 35px !important; font-size: 1.2rem !important; }
            .speaker-name { font-size: 0.85rem !important; }
            .dialog-text { font-size: 0.95rem !important; padding: 10px !important; min-height: 60px !important; }
            .choice-btn { padding: 8px 12px !important; font-size: 0.8rem !important; min-width: 100px !important; }
            .result-card { width: 95% !important; padding: 1.2rem !important; }
            .students-table { font-size: 0.75rem; }
            .students-table th, .students-table td { padding: 6px !important; }
            .detail-btn { padding: 4px 8px !important; font-size: 0.7rem !important; }
        }
        .start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #0a0f1e, #0f172a); display: flex; align-items: center; justify-content: center; z-index: 100; overflow-y: auto; padding: 20px; }
        .start-card { background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(10px); border-radius: 32px; padding: 2rem; width: 450px; max-width: 100%; text-align: center; border: 1px solid rgba(139, 92, 246, 0.4); }
        .start-card h1 { font-size: 1.8rem; margin-bottom: 0.5rem; background: linear-gradient(135deg, #c084fc, #818cf8); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .role-buttons { display: flex; gap: 15px; margin: 20px 0; }
        .role-btn { flex: 1; background: rgba(51, 65, 85, 0.8); border: 1px solid rgba(139, 92, 246, 0.4); padding: 10px; font-size: 0.9rem; border-radius: 40px; cursor: pointer; }
        .role-btn.active { background: linear-gradient(135deg, #c084fc, #818cf8); border: none; }
        .form-group { text-align: left; margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #94a3b8; font-size: 0.85rem; }
        .form-group input { width: 100%; padding: 10px; border-radius: 12px; border: 1px solid rgba(139, 92, 246, 0.3); background: rgba(15, 23, 42, 0.8); color: #e2e8f0; font-size: 0.9rem; }
        .error-msg { color: #ef4444; font-size: 0.8rem; margin-top: 10px; }
        .hidden { display: none !important; }
        button { background: linear-gradient(135deg, #c084fc, #818cf8); color: white; border: none; padding: 12px 24px; border-radius: 40px; font-size: 1rem; font-weight: 600; cursor: pointer; width: 100%; transition: all 0.2s; }
        button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(139, 92, 246, 0.4); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .game-screen, .teacher-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0f; z-index: 50; overflow-y: auto; }
        .background-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; z-index: 0; }
        .vignette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%); z-index: 1; pointer-events: none; }
        .dialog-panel, .teacher-panel { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(15, 23, 42, 0.98), rgba(15, 23, 42, 0.9)); backdrop-filter: blur(10px); padding: 20px; z-index: 10; border-top: 1px solid rgba(139, 92, 246, 0.3); }
        .speaker-info { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .speaker-avatar { width: 45px; height: 45px; background: linear-gradient(135deg, #c084fc, #818cf8); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        .speaker-name { font-size: 1rem; font-weight: bold; color: #c084fc; }
        .dialog-text { font-size: 1.1rem; line-height: 1.5; margin-bottom: 15px; padding: 12px; background: rgba(0, 0, 0, 0.4); border-radius: 16px; min-height: 70px; }
        .choices-container { display: flex; gap: 10px; flex-wrap: wrap; }
        .choice-btn { background: rgba(51, 65, 85, 0.9); border: 1px solid rgba(139, 92, 246, 0.4); padding: 8px 16px; border-radius: 40px; font-size: 0.85rem; color: #e2e8f0; cursor: pointer; width: auto; flex: 1; min-width: 120px; }
        .choice-btn:hover { background: rgba(139, 92, 246, 0.5); transform: translateX(5px); }
        .progress-bar { position: absolute; top: 0; left: 0; height: 3px; background: linear-gradient(90deg, #c084fc, #818cf8); transition: width 0.3s; z-index: 20; }
        .typing-cursor { display: inline-block; width: 2px; height: 1.1em; background: #c084fc; margin-left: 2px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
        .teacher-panel { text-align: left; padding: 20px; }
        .teacher-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid rgba(139, 92, 246, 0.3); }
        .class-code-box { background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 40px; font-family: monospace; font-size: 1.2rem; letter-spacing: 1px; color: #c084fc; display: inline-block; margin-top: 5px; word-break: break-all; }
        .students-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.85rem; }
        .students-table th, .students-table td { padding: 10px; text-align: left; border-bottom: 1px solid rgba(139, 92, 246, 0.2); }
        .students-table th { color: #c084fc; font-weight: 600; }
        .risk-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; }
        .risk-low { background: #22c55e20; color: #22c55e; border: 1px solid #22c55e; }
        .risk-medium { background: #eab30820; color: #eab308; border: 1px solid #eab308; }
        .risk-high { background: #ef444420; color: #ef4444; border: 1px solid #ef4444; }
        .teacher-buttons { display: flex; gap: 15px; flex-wrap: wrap; margin-top: 20px; margin-bottom: 20px; }
        .teacher-buttons button { width: auto; padding: 10px 20px; }
        .detail-btn { background: rgba(51, 65, 85, 0.8); border: 1px solid rgba(139, 92, 246, 0.4); padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; cursor: pointer; transition: all 0.2s; }
        .detail-btn:hover { background: rgba(139, 92, 246, 0.4); }
        .result-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 200; display: flex; align-items: center; justify-content: center; overflow-y: auto; padding: 20px; }
        .result-card { background: rgba(30, 41, 59, 0.98); border-radius: 32px; padding: 2rem; width: 450px; max-width: 100%; text-align: center; border: 1px solid rgba(139, 92, 246, 0.4); }
        .simple-result { text-align: center; padding: 40px; }
        .result-detail { text-align: left; }
        .result-detail h3 { color: #c084fc; margin: 15px 0 10px; font-size: 1.1rem; }
        .detail-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(139, 92, 246, 0.2); font-size: 0.9rem; }
        .close-btn { margin-top: 20px; }
        .history-classes { margin-top: 20px; border-top: 1px solid rgba(139, 92, 246, 0.2); padding-top: 15px; }
        .history-item { display: inline-block; background: rgba(51, 65, 85, 0.5); padding: 5px 12px; border-radius: 20px; margin: 5px; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; }
        .history-item:hover { background: rgba(139, 92, 246, 0.4); }
        .history-item.active { background: linear-gradient(135deg, #c084fc, #818cf8); }
    </style>
</head>
<body>
    <div id="startScreen" class="start-screen">
        <div class="start-card">
            <h1>Тайна старой школы</h1>
            <div class="role-buttons">
                <button id="studentRoleBtn" class="role-btn active">Ученик</button>
                <button id="teacherRoleBtn" class="role-btn">Учитель</button>
            </div>
            <div id="studentForm">
                <div class="form-group"><label>ФИО</label><input type="text" id="studentName" placeholder="Иванов Иван Иванович"></div>
                <div class="form-group"><label>Код класса</label><input type="text" id="studentCode" placeholder="Например: 9А-7F3D"></div>
            </div>
            <div id="teacherForm" class="hidden">
                <div class="form-group"><label>Логин</label><input type="text" id="teacherLogin" placeholder="teacher"></div>
                <div class="form-group"><label>Пароль</label><input type="password" id="teacherPassword" placeholder="school123"></div>
            </div>
            <div id="errorMsg" class="error-msg"></div>
            <button id="startBtn">Далее</button>
        </div>
    </div>

    <div id="gameScreen" class="game-screen hidden">
        <div class="progress-bar" id="progressBar"></div>
        <div class="background-layer" id="backgroundLayer"></div>
        <div class="vignette"></div>
        <div class="dialog-panel">
            <div class="speaker-info"><div class="speaker-avatar" id="speakerAvatar">?</div><div class="speaker-name" id="speakerName">Ты</div></div>
            <div class="dialog-text" id="dialogText"><span id="displayText"></span><span class="typing-cursor"></span></div>
            <div class="choices-container" id="choicesContainer"></div>
        </div>
    </div>

    <div id="teacherScreen" class="teacher-screen hidden">
        <div class="teacher-panel">
            <div class="teacher-header">
                <h2>Личный кабинет учителя</h2>
                <div>
                    <div style="font-size:0.8rem; color:#94a3b8;">Текущий класс</div>
                    <div class="class-code-box" id="classCodeDisplay">—</div>
                </div>
            </div>
            <div class="teacher-buttons">
                <button id="generateCodeBtn">Создать новый класс</button>
                <button id="downloadReportBtn">Скачать отчёт</button>
                <button id="logoutBtn">Выйти</button>
            </div>
            
            <div id="historyClassesContainer" class="history-classes">
                <div style="font-size:0.8rem; color:#94a3b8; margin-bottom:8px;">Мои классы</div>
                <div id="historyClassesList"></div>
            </div>
            
            <div id="studentsListContainer">
                <h3>Ученики класса <span id="currentClassNameSpan"></span></h3>
                <div style="overflow-x: auto;">
                    <table class="students-table" id="studentsTable">
                        <thead>
                            <tr><th>ФИО</th><th>Код</th><th>Статус</th><th>Риск</th><th>Дата</th><th>Детали</th></tr>
                        </thead>
                        <tbody id="studentsTableBody"><tr><td colspan="6" style="text-align:center">Нет учеников</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        const SUPABASE_URL = 'https://rhjaoewcnbuzfinkioji.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_TUPXNw5gLiqQaHA7cpanqQ_1kHBLVaK';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // ========== ПЕРЕМЕННЫЕ ==========
        let currentStudent = null;
        let currentTeacher = null;
        let allStudents = [];
        let diagnosticResults = [];
        let currentSceneId = "1";
        let isTyping = false;
        let typingTimeout = null;
        
        // ========== ФУНКЦИИ SUPABASE ==========
        async function loadTeacherClasses(teacherId) {
            const { data, error } = await supabase
                .from('classes')
                .select('*')
                .eq('teacher_id', teacherId);
            if (error) return [];
            return data || [];
        }
        
        async function loadStudentsWithResults(classCode) {
            const { data: students, error } = await supabase
                .from('students')
                .select('*')
                .eq('class_code', classCode);
            if (error) return [];
            
            const result = [];
            for (const student of students) {
                const { data: results } = await supabase
                    .from('results')
                    .select('*')
                    .eq('student_id', student.id)
                    .maybeSingle();
                result.push({
                    id: student.id,
                    name: student.full_name,
                    classCode: student.class_code,
                    completed: !!results,
                    riskLevel: results?.risk_level || null,
                    overallRiskPercent: results?.overall_risk_percent || null,
                    scaleResults: results?.scale_results || null,
                    date: results?.completed_at ? new Date(results.completed_at).toLocaleString('ru-RU') : null
                });
            }
            return result;
        }
        
        async function doTeacherLogin(login, password) {
            if (login !== 'teacher' || password !== 'school123') {
                return { success: false, message: 'Неверный логин или пароль' };
            }
            let { data: teacher, error } = await supabase
                .from('teachers')
                .select('*')
                .eq('login', login)
                .maybeSingle();
            if (error || !teacher) {
                const { data: newTeacher, error: insertError } = await supabase
                    .from('teachers')
                    .insert([{ login: login, password: password, full_name: 'Учитель', school: 'Школа' }])
                    .select()
                    .single();
                if (insertError) {
                    return { success: false, message: 'Ошибка создания учителя: ' + insertError.message };
                }
                teacher = newTeacher;
            }
            const classes = await loadTeacherClasses(teacher.id);
            return { success: true, teacher: { ...teacher, classes: classes } };
        }
        
        async function doStudentLogin(name, classCode) {
            const { data: classData, error: classError } = await supabase
                .from('classes')
                .select('*')
                .eq('class_code', classCode)
                .maybeSingle();
            if (classError || !classData) {
                return { success: false, error: 'Неверный код класса' };
            }
            let { data: students, error: studentError } = await supabase
                .from('students')
                .select('*')
                .eq('full_name', name)
                .eq('class_code', classCode);
            if (studentError) {
                return { success: false, error: studentError.message };
            }
            let student = students?.[0];
            if (!student) {
                const { data: newStudent, error: insertError } = await supabase
                    .from('students')
                    .insert([{ full_name: name, class_code: classCode, parent_consent: true, student_consent: true }])
                    .select()
                    .single();
                if (insertError) {
                    return { success: false, error: insertError.message };
                }
                student = newStudent;
            } else {
                const { data: existingResult } = await supabase
                    .from('results')
                    .select('*')
                    .eq('student_id', student.id)
                    .maybeSingle();
                if (existingResult) {
                    return { success: false, alreadyCompleted: true };
                }
            }
            return { success: true, student: student };
        }
        
        async function saveResult(studentId, results) {
            const { error } = await supabase
                .from('results')
                .insert([{
                    student_id: studentId,
                    overall_risk_percent: results.overallRiskPercent,
                    risk_level: results.riskLevel,
                    scale_results: results.scaleResults,
                    answers: results.answers
                }]);
            return !error;
        }
        
        async function createClass(teacherId, className) {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ0123456789';
            let code = '';
            for (let i = 0; i < 4; i++) code += chars[Math.floor(Math.random() * chars.length)];
            const classCode = `${className}-${code}`;
            const { data, error } = await supabase
                .from('classes')
                .insert([{ teacher_id: teacherId, class_name: className, class_code: classCode }])
                .select()
                .single();
            if (error) return { success: false, error: error.message };
            return { success: true, class: data };
        }
        
        async function deleteClass(classId, classCode) {
            const { data: students } = await supabase
                .from('students')
                .select('id')
                .eq('class_code', classCode);
            if (students && students.length > 0) {
                for (const student of students) {
                    await supabase.from('results').delete().eq('student_id', student.id);
                }
                await supabase.from('students').delete().eq('class_code', classCode);
            }
            const { error } = await supabase.from('classes').delete().eq('id', classId);
            return !error;
        }
        
        // ========== КВЕСТ ==========
        const scalesConfig = {
            "Демонстративность": { coef: 1.2, maxVal: 6 },
            "Аффективность": { coef: 1.1, maxVal: 6.6 },
            "Уникальность": { coef: 1.2, maxVal: 6 },
            "Несостоятельность": { coef: 1.5, maxVal: 7.5 },
            "Социальный пессимизм": { coef: 1, maxVal: 6 },
            "Слом культурных барьеров": { coef: 2.3, maxVal: 6.9 },
            "Максимализм": { coef: 3.2, maxVal: 6.4 },
            "Временная перспектива": { coef: 1.1, maxVal: 6.6 },
            "Антисуицидальный фактор": { coef: 3.2, maxVal: 6.4 }
        };
        
        const sceneScales = {
            "2": ["Аффективность", "Уникальность"],
            "4A": ["Демонстративность", "Уникальность", "Временная перспектива"],
            "4B": ["Демонстративность", "Уникальность", "Временная перспектива"]
        };
        
        const gradients = {
            school: 'linear-gradient(135deg, #1a1a2e, #16213e)',
            corridor: 'linear-gradient(135deg, #1a0f0f, #2d1a1a)',
            stairs: 'linear-gradient(135deg, #0f0c29, #302b63)',
            dead_end: 'linear-gradient(135deg, #000000, #1a0a2e)',
            notebook: 'linear-gradient(135deg, #2a1a0a, #3a2a1a)'
        };
        
        const scenes = {
            "1": { id: "1", text: "Ты стоишь у входа в старую школу. Изнутри доносится странный шум.", choices: [], next: { A: "2", B: "2" }, speaker: "?", speakerName: "Ты", bg: "school", diagnostic: null, noChoice: true },
            "2": { id: "2", text: "Ты заходишь внутрь. Внезапно за спиной хлопает дверь. Сердце начинает биться быстрее.", choices: ["Взять себя в руки и идти дальше", "Застыть на месте от неожиданности"], next: { A: "3A", B: "3B" }, speaker: "?", speakerName: "Ты", bg: "corridor", diagnostic: "2" },
            "3A": { id: "3A", text: "Ты идёшь по тёмному коридору. Справа - лестница вниз, слева - дверь.", choices: ["Спуститься по лестнице", "Открыть дверь"], next: { A: "4A", B: "4B" }, speaker: "?", speakerName: "Ты", bg: "stairs", diagnostic: null },
            "3B": { id: "3B", text: "Придя в себя, ты идёшь по тёмному коридору. Справа - лестница вниз, слева - дверь.", choices: ["Спуститься по лестнице", "Открыть дверь"], next: { A: "4A", B: "4B" }, speaker: "?", speakerName: "Ты", bg: "stairs", diagnostic: null },
            "4A": { id: "4A", text: "Ты спускаешься по лестнице и попадаешь в тупик. Выхода не видно.", choices: ["Продолжать искать выход", "Сесть на ступеньку и ждать"], next: { A: "5", B: "5" }, speaker: "?", speakerName: "Ты", bg: "dead_end", diagnostic: "4A" },
            "4B": { id: "4B", text: "Открыв дверь ты видишь лестницу, спускаешься по ней и попадаешь в тупик. Выхода не видно.", choices: ["Продолжать искать выход", "Сесть на ступеньку и ждать"], next: { A: "5", B: "5" }, speaker: "?", speakerName: "Ты", bg: "dead_end", diagnostic: "4B" },
            "5": { id: "5", text: "На полу лежит старая тетрадь.", choices: [], next: { A: "end", B: "end" }, speaker: "?", speakerName: "Ты", bg: "notebook", diagnostic: null, noChoice: true }
        };
        
        function setBackground(bgKey) {
            const bgDiv = document.getElementById('backgroundLayer');
            const imgPath = 'images/backgrounds/bg_' + bgKey + '.jpg';
            const img = new Image();
            img.onload = function() { 
                bgDiv.style.backgroundImage = 'url(' + imgPath + ')'; 
                bgDiv.style.backgroundSize = 'cover'; 
                bgDiv.style.backgroundPosition = 'center'; 
            };
            img.onerror = function() { 
                bgDiv.style.background = gradients[bgKey] || 'linear-gradient(135deg, #0a0f1e, #0f172a)'; 
            };
            img.src = imgPath;
        }
        
        function typeText(text, element, callback) {
            if (typingTimeout) clearTimeout(typingTimeout);
            if (isTyping) return;
            isTyping = true;
            let i = 0;
            element.innerHTML = '';
            function type() {
                if (i < text.length) { 
                    element.innerHTML += text[i]; 
                    i++; 
                    typingTimeout = setTimeout(type, 35); 
                } else { 
                    isTyping = false; 
                    if (callback) callback(); 
                }
            }
            type();
        }
        
        function loadScene() {
            const scene = scenes[currentSceneId];
            if (!scene || currentSceneId === 'end') { finishGame(); return; }
            setBackground(scene.bg);
            document.getElementById('speakerAvatar').innerText = scene.speaker;
            document.getElementById('speakerName').innerText = scene.speakerName;
            const displaySpan = document.getElementById('displayText');
            const container = document.getElementById('choicesContainer');
            container.innerHTML = '';
            typeText(scene.text, displaySpan, function() {
                if (scene.noChoice || scene.choices.length === 0) {
                    setTimeout(function() { 
                        if (scene.next && scene.next.A) { 
                            currentSceneId = scene.next.A; 
                            loadScene(); 
                        } 
                    }, 1500);
                } else {
                    for (let idx = 0; idx < scene.choices.length; idx++) {
                        const choice = scene.choices[idx];
                        const choiceKey = idx === 0 ? 'A' : 'B';
                        const btn = document.createElement('button');
                        btn.className = 'choice-btn';
                        btn.innerText = choice;
                        btn.onclick = function() {
                            if (isTyping) return;
                            const score = (choiceKey === 'A' ? 0 : 1);
                            if (scene.diagnostic) {
                                diagnosticResults.push({ sceneId: scene.id, sceneCode: scene.diagnostic, score: score });
                            }
                            const nextSceneId = scene.next[choiceKey];
                            if (nextSceneId === 'end') finishGame();
                            else { currentSceneId = nextSceneId; loadScene(); }
                        };
                        container.appendChild(btn);
                    }
                }
            });
            const sceneIds = Object.keys(scenes).filter(function(k) { return !k.includes('end'); });
            const currentIndex = sceneIds.indexOf(currentSceneId);
            if (currentIndex !== -1) {
                const progress = ((currentIndex + 1) / sceneIds.length) * 100;
                document.getElementById('progressBar').style.width = Math.min(progress, 100) + '%';
            }
        }
        
        function calculateFullResults(results) {
            const rawScores = {};
            for (let scale of Object.keys(scalesConfig)) rawScores[scale] = 0;
            for (let res of results) {
                const scalesList = sceneScales[res.sceneCode];
                if (scalesList) {
                    for (let scale of scalesList) rawScores[scale] += res.score;
                }
            }
            const scaleResults = {};
            let totalPercentSum = 0;
            let scaleCount = 0;
            for (let [scale, config] of Object.entries(scalesConfig)) {
                const rawScore = rawScores[scale];
                const finalValue = (rawScore * config.coef).toFixed(1);
                const percentOfMax = (parseFloat(finalValue) / config.maxVal) * 100;
                scaleResults[scale] = { finalValue: parseFloat(finalValue), maxValue: config.maxVal, percentOfMax: Math.round(percentOfMax) };
                totalPercentSum += percentOfMax;
                scaleCount++;
            }
            const overallRiskPercent = Math.round(totalPercentSum / scaleCount);
            let riskLevel = '';
            if (overallRiskPercent < 30) riskLevel = 'Низкий';
            else if (overallRiskPercent < 60) riskLevel = 'Средний';
            else riskLevel = 'Высокий';
            return { overallRiskPercent, riskLevel, scaleResults };
        }
        
        async function finishGame() {
            if (currentStudent) {
                const fullResults = calculateFullResults(diagnosticResults);
                await saveResult(currentStudent.id, {
                    overallRiskPercent: fullResults.overallRiskPercent,
                    riskLevel: fullResults.riskLevel,
                    scaleResults: fullResults.scaleResults,
                    answers: diagnosticResults
                });
            }
            document.getElementById('gameScreen').classList.add('hidden');
            const simpleResultHtml = '<div class="result-overlay" id="resultOverlay"><div class="result-card simple-result"><h2>Квест пройден!</h2><p>Спасибо за прохождение!</p></div></div>';
            document.body.insertAdjacentHTML('beforeend', simpleResultHtml);
            setTimeout(function() { 
                const overlay = document.getElementById('resultOverlay'); 
                if (overlay) overlay.remove(); 
                location.reload(); 
            }, 3000);
        }
        
        // ========== UI ==========
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'; }); }
        
        async function updateTeacherUI() {
            if (!currentTeacher) return;
            const classes = await loadTeacherClasses(currentTeacher.id);
            currentTeacher.classes = classes;
            const currentClass = currentTeacher.classes.find(c => c.id === currentTeacher.currentClassId) || currentTeacher.classes[0];
            const classCodeDisplay = document.getElementById('classCodeDisplay');
            const currentClassNameSpan = document.getElementById('currentClassNameSpan');
            if (currentClass) {
                classCodeDisplay.textContent = currentClass.class_name + ' (' + currentClass.class_code + ')';
                if (currentClassNameSpan) currentClassNameSpan.textContent = currentClass.class_name;
                currentTeacher.currentClassId = currentClass.id;
                const students = await loadStudentsWithResults(currentClass.class_code);
                allStudents = students;
                const tbody = document.getElementById('studentsTableBody');
                if (students.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">Нет учеников</td></tr>';
                } else {
                    let rows = '';
                    for (let s of students) {
                        let riskClass = '', riskText = '';
                        if (s.riskLevel === 'Низкий') { riskClass = 'risk-low'; riskText = 'Низкий'; }
                        else if (s.riskLevel === 'Средний') { riskClass = 'risk-medium'; riskText = 'Средний'; }
                        else if (s.riskLevel === 'Высокий') { riskClass = 'risk-high'; riskText = 'Высокий'; }
                        else { riskText = '—'; }
                        rows += `<tr>
                            <td>${escapeHtml(s.name)}</td>
                            <td>${escapeHtml(s.classCode)}</td>
                            <td>${s.completed ? '✅ Пройден' : '⏳ Не пройден'}</td>
                            <td>${s.completed ? `<span class="risk-badge ${riskClass}">${riskText}</span>` : '—'}</td>
                            <td>${s.date || '—'}</td>
                            <td>${s.completed ? '<button class="detail-btn" onclick="alert(\'Детали результатов\')">📊</button>' : '—'}</td>
                        </tr>`;
                    }
                    tbody.innerHTML = rows;
                }
            } else {
                classCodeDisplay.textContent = 'Не создан';
                if (currentClassNameSpan) currentClassNameSpan.textContent = '—';
            }
            const historyList = document.getElementById('historyClassesList');
            if (currentTeacher.classes && currentTeacher.classes.length > 0) {
                let historyHtml = '';
                for (let cls of currentTeacher.classes) {
                    const isActive = (currentTeacher.currentClassId === cls.id);
                    historyHtml += `<div style="display: flex; justify-content: space-between; margin: 5px 0;">
                        <span class="history-item ${isActive ? 'active' : ''}" onclick="switchToClass(${cls.id})">${cls.class_name} (${cls.class_code})</span>
                        <button class="detail-btn" style="background:#ef4444;" onclick="deleteClassConfirm(${cls.id}, '${cls.class_code}')">Удалить</button>
                    </div>`;
                }
                historyList.innerHTML = historyHtml;
            } else {
                historyList.innerHTML = '<div style="color:#94a3b8;">Нет созданных классов</div>';
            }
        }
        
        window.switchToClass = async function(classId) {
            if (currentTeacher) {
                currentTeacher.currentClassId = classId;
                await updateTeacherUI();
            }
        };
        
        window.deleteClassConfirm = async function(classId, classCode) {
            if (confirm('Удалить класс? Все ученики и результаты будут удалены!')) {
                await deleteClass(classId, classCode);
                await updateTeacherUI();
                alert('Класс удалён');
            }
        };
        
        // ========== ОБРАБОТЧИКИ СТАРТОВОГО ЭКРАНА ==========
        let currentRole = 'student';
        const studentRoleBtn = document.getElementById('studentRoleBtn');
        const teacherRoleBtn = document.getElementById('teacherRoleBtn');
        const studentForm = document.getElementById('studentForm');
        const teacherForm = document.getElementById('teacherForm');
        const startBtn = document.getElementById('startBtn');
        const studentName = document.getElementById('studentName');
        const studentCode = document.getElementById('studentCode');
        const teacherLoginInput = document.getElementById('teacherLogin');
        const teacherPasswordInput = document.getElementById('teacherPassword');
        const errorMsg = document.getElementById('errorMsg');
        
        function checkForm() {
            if (currentRole === 'student') {
                startBtn.disabled = !(studentName.value.trim() && studentCode.value.trim());
            } else {
                startBtn.disabled = !(teacherLoginInput.value.trim() && teacherPasswordInput.value.trim());
            }
        }
        
        studentRoleBtn.onclick = function() {
            currentRole = 'student';
            studentRoleBtn.classList.add('active');
            teacherRoleBtn.classList.remove('active');
            studentForm.classList.remove('hidden');
            teacherForm.classList.add('hidden');
            checkForm();
        };
        
        teacherRoleBtn.onclick = function() {
            currentRole = 'teacher';
            teacherRoleBtn.classList.add('active');
            studentRoleBtn.classList.remove('active');
            studentForm.classList.add('hidden');
            teacherForm.classList.remove('hidden');
            checkForm();
        };
        
        studentName.addEventListener('input', checkForm);
        studentCode.addEventListener('input', checkForm);
        teacherLoginInput.addEventListener('input', checkForm);
        teacherPasswordInput.addEventListener('input', checkForm);
        
        startBtn.onclick = async function() {
            errorMsg.innerText = '';
            if (currentRole === 'student') {
                const name = studentName.value.trim();
                const classCode = studentCode.value.trim().toUpperCase();
                if (!name) { errorMsg.innerText = 'Введите ФИО'; return; }
                if (!classCode) { errorMsg.innerText = 'Введите код класса'; return; }
                const result = await doStudentLogin(name, classCode);
                if (!result.success) {
                    errorMsg.innerText = result.alreadyCompleted ? 'Вы уже проходили квест!' : (result.error || 'Ошибка');
                    return;
                }
                currentStudent = result.student;
                diagnosticResults = [];
                document.getElementById('startScreen').classList.add('hidden');
                document.getElementById('gameScreen').classList.remove('hidden');
                currentSceneId = "1";
                loadScene();
            } else {
                const login = teacherLoginInput.value.trim();
                const password = teacherPasswordInput.value.trim();
                const result = await doTeacherLogin(login, password);
                if (!result.success) {
                    errorMsg.innerText = result.message;
                    return;
                }
                currentTeacher = result.teacher;
                if (currentTeacher.classes && currentTeacher.classes.length > 0) {
                    currentTeacher.currentClassId = currentTeacher.classes[0].id;
                }
                document.getElementById('startScreen').classList.add('hidden');
                document.getElementById('teacherScreen').classList.remove('hidden');
                await updateTeacherUI();
            }
        };
        
        document.getElementById('generateCodeBtn').addEventListener('click', async function() {
            if (!currentTeacher) return;
            const className = prompt('Введите название класса (9А, 10Б, 11В):', '');
            if (className && className.trim()) {
                const newClassName = className.trim().toUpperCase();
                const result = await createClass(currentTeacher.id, newClassName);
                if (result.success) {
                    await updateTeacherUI();
                    alert('Код класса: ' + result.class.class_code);
                } else {
                    alert('Ошибка: ' + result.error);
                }
            }
        });
        
        document.getElementById('downloadReportBtn').addEventListener('click', function() {
            alert('Функция экспорта отчёта будет добавлена позже');
        });
        
        document.getElementById('logoutBtn').addEventListener('click', function() {
            currentTeacher = null;
            document.getElementById('teacherScreen').classList.add('hidden');
            document.getElementById('startScreen').classList.remove('hidden');
            teacherLoginInput.value = '';
            teacherPasswordInput.value = '';
            startBtn.disabled = true;
        });
        
        checkForm();
    </script>
</body>
</html>
