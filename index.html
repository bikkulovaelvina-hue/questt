<body>
    <div id="startScreen" class="start-screen">

    <script>

        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function loadTeacher(login) {
            const { data, error } = await sb.from('teachers').select('*').eq('login', login).single();
            if (error && error.code !== 'PGRST116') return null;
            return data;
        }
        async function createTeacher(login, name) {
            const id = Date.now().toString();
            const { data, error } = await sb.from('teachers').insert([{ id, login, name }]).select().single();
            if (error) return null;
            return data;
        }
        async function loadClasses(teacherId) {
            const { data, error } = await sb.from('classes').select('*').eq('teacher_id', teacherId).order('created_at', { ascending: true });
            if (error) return [];
            return data || [];
        }
        async function createClass(teacherId, className, classCode) {
            const id = Date.now().toString();
            const { data, error } = await sb.from('classes').insert([{ id, teacher_id: teacherId, class_name: className, class_code: classCode }]).select().single();
            if (error) return null;
            return data;
        }
        async function deleteClass(classId) {
            const { error } = await sb.from('classes').delete().eq('id', classId);
            if (error) return false;
            return true;
        }
        async function loadStudents(classId) {
            const { data, error } = await sb.from('students').select('*').eq('class_id', classId).order('created_at', { ascending: true });
            if (error) return [];
            return (data || []).map(s => ({ ...s, scaleResults: s.scale_results || null, results: s.results || [] }));
        }
        async function saveStudentResults(student) {
            const { error } = await sb.from('students').upsert({
                id: student.id, teacher_id: student.teacher_id, class_id: student.class_id,
                name: student.name, class_code: student.class_code, completed: student.completed,
                risk_level: student.riskLevel, overall_risk: student.overallRiskPercent,
                scale_results: student.scaleResults, date: student.date, results: student.results,
                ai_report_html: student.ai_report_html, ai_raw_data: student.ai_raw_data
            });
            if (error) return false;
            return true;
        }
        async function findOrCreateStudent(name, classCode, classId, teacherId) {
            const { data: existing } = await sb.from('students').select('*').eq('name', name).eq('class_id', classId).maybeSingle();
            if (existing) return { ...existing, scaleResults: existing.scale_results, results: existing.results || [] };
            const id = Date.now().toString();
            const newStudent = { id, teacher_id: teacherId, class_id: classId, name, class_code: classCode, completed: false, risk_level: null, overall_risk: null, scale_results: null, date: null, results: [], ai_report_html: null, ai_raw_data: null };
            const { error } = await sb.from('students').insert([newStudent]);
            if (error) return null;
            return { ...newStudent, scaleResults: null, results: [] };
        }
        async function findClassByCode(classCode) {
            const { data, error } = await sb.from('classes').select('*').eq('class_code', classCode).maybeSingle();

            return { ...data, teacherId: data.teacher_id };
        }
        function generateRandomCode() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ0123456789';
            let code = '';
            for (let i = 0; i < 4; i++) code += chars[Math.floor(Math.random() * chars.length)];
            return code;
        }
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // ========== ШКАЛЫ ==========

        };
        const sceneScales = {
            "2": ["Аффективность", "Уникальность"], "4A": ["Демонстративность", "Уникальность", "Временная перспектива"],

            "29B": ["Социальный пессимизм"], "30": ["Социальный пессимизм"], "31": ["Социальный пессимизм"],

        function typeText(text, element, callback) {
            if (typingTimeout) clearTimeout(typingTimeout);
            if (isTyping) return;
            isTyping = true;
            let i = 0;
            element.innerHTML = '';
            function type() {
                if (i < text.length) {
                    element.innerHTML += text[i];
                    i++;
                    typingTimeout = setTimeout(type, 35);
                } else {
                    isTyping = false;
                    if (callback) callback();
                }
            }
            type();
        }

            const scene = scenes[currentSceneId];
            if (!scene || currentSceneId === 'end') { finishGame(); return; }
            
            AIAnalytics.startScene(currentSceneId, scene.diagnostic || 'none');
            sceneStartTime = Date.now();
            
            setBackground(scene.bg);
            document.getElementById('speakerAvatar').innerText = scene.speaker;
            document.getElementById('speakerName').innerText = scene.speakerName;
            const displaySpan = document.getElementById('displayText');
            const container = document.getElementById('choicesContainer');
            container.innerHTML = '';
            
            const nextBtn = document.getElementById('nextBtn');
            nextBtn.style.display = 'none';
            nextBtn.disabled = true;
            
            selectedChoiceKey = null;
            selectedChoiceText = null;
            selectedScore = null;
            selectedTime = null;
            firstChoiceKey = null;
            firstChoiceText = null;
            firstChoiceScore = null;
            firstChoiceTime = null;
            
            typeText(scene.text, displaySpan, function() {
                questionAppearTime = Date.now();
                
                if (scene.noChoice || scene.choices.length === 0) {
                    setTimeout(function() { 
                        if (scene.next && scene.next.A) { 
                            AIAnalytics.endScene();
                            currentSceneId = scene.next.A; 
                            loadScene(); 
                        } 
                    }, 1500);
                } else {
                    for (let idx = 0; idx < scene.choices.length; idx++) {
                        const choice = scene.choices[idx];
                        const choiceKey = idx === 0 ? 'A' : 'B';
                        const score = (choiceKey === 'A' ? 0 : 1);
                        const btn = document.createElement('button');
                        btn.className = 'choice-btn';
                        btn.innerText = choice;
                        
                        btn.onclick = function() {
                            if (isTyping) return;
                            
                            const timeToChoose = (Date.now() - questionAppearTime) / 1000;
                            
                            if (firstChoiceKey === null) {
                                firstChoiceKey = choiceKey;
                                firstChoiceText = choice;
                                firstChoiceScore = score;
                                firstChoiceTime = timeToChoose;
                            }
                            
                            document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
                            btn.classList.add('selected');
                            
                            selectedChoiceKey = choiceKey;
                            selectedChoiceText = choice;
                            selectedScore = score;
                            selectedTime = timeToChoose;

                        };

        function calculateFullResults(results) {
            const rawScores = {};
            for (let scale of Object.keys(scalesConfig)) rawScores[scale] = 0;
            for (let res of results) {
                const scalesList = sceneScales[res.sceneCode];
                if (scalesList) for (let scale of scalesList) rawScores[scale] += res.score;
            }
            const scaleResults = {};
            let totalPercentSum = 0;
            let scaleCount = 0;
            for (let [scale, config] of Object.entries(scalesConfig)) {
                const rawScore = rawScores[scale];
                const finalValue = (rawScore * config.coef).toFixed(1);
                const percentOfMax = (parseFloat(finalValue) / config.maxVal) * 100;
                scaleResults[scale] = { finalValue: parseFloat(finalValue), maxValue: config.maxVal, percentOfMax: Math.round(percentOfMax) };
                totalPercentSum += percentOfMax;
                scaleCount++;
            }
            const overallRiskPercent = Math.round(totalPercentSum / scaleCount);
            let riskLevel = '';
            if (overallRiskPercent < 30) riskLevel = 'Низкий';
            else if (overallRiskPercent < 60) riskLevel = 'Средний';
            else riskLevel = 'Высокий';
            return { overallRiskPercent, riskLevel, scaleResults };
        }

        async function updateTeacherUI() {

            const classes = await loadClasses(currentTeacher.id);

            const currentClass = classes.find(c => c.id === currentTeacher.currentClassId) || classes[0];

            const classCodeDisplay = document.getElementById('classCodeDisplay');
            const currentClassNameSpan = document.getElementById('currentClassNameSpan');
            if (currentClass) {

                if (currentClassNameSpan) currentClassNameSpan.textContent = currentClass.class_name;
                currentClassId = currentClass.id;
            } else {

                if (currentClassNameSpan) currentClassNameSpan.textContent = '—';
                currentClassId = null;
            }
            const historyContainer = document.getElementById('historyClassesContainer');

            if (classes && classes.length > 0) {

                    const isActive = (currentTeacher.currentClassId === cls.id);

                }

            } else { historyContainer.style.display = 'none'; }
            const tbody = document.getElementById('studentsTableBody');
            if (!tbody) return;
            if (!currentClassId) { tbody.innerHTML = '</table><td colspan="6" style="text-align:center">Сначала создайте класс</td></tr>'; return; }
            const classStudents = await loadStudents(currentClassId);
            if (classStudents.length === 0) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">Нет учеников</td></tr>'; return; }
            let rows = '';
            for (let s of classStudents) {
                let riskClass = '', riskText = '';
                if (s.risk_level === 'Низкий') { riskClass = 'risk-low'; riskText = 'Низкий'; }
                else if (s.risk_level === 'Средний') { riskClass = 'risk-medium'; riskText = 'Средний'; }
                else if (s.risk_level === 'Высокий') { riskClass = 'risk-high'; riskText = 'Высокий'; }
                else { riskText = '—'; }
                rows += `<tr><td>${escapeHtml(s.name)}</td><td>${escapeHtml(s.class_code)}</td><td>${s.completed ? 'Пройден' : 'Не пройден'}</td><td>${s.completed ? '<span class="risk-badge ' + riskClass + '">' + riskText + '</span>' : '—'}</td><td>${s.date || '—'}</td><td>${s.completed ? '<button class="detail-btn" onclick="showDetailedReport(\'' + s.id + '\')">Детали</button>' : '—'}</td></tr>`;
            }
            tbody.innerHTML = rows;
        }

        }
        studentRoleBtn.onclick = function() { currentRole = 'student'; studentRoleBtn.classList.add('active'); teacherRoleBtn.classList.remove('active'); studentForm.classList.remove('hidden'); teacherForm.classList.add('hidden'); checkStudentForm(); };
        teacherRoleBtn.onclick = function() { currentRole = 'teacher'; teacherRoleBtn.classList.add('active'); studentRoleBtn.classList.remove('active'); studentForm.classList.add('hidden'); teacherForm.classList.remove('hidden'); checkStudentForm(); };
        studentName.addEventListener('input', checkStudentForm);
        studentCode.addEventListener('input', checkStudentForm);
        teacherLoginInput.addEventListener('input', checkStudentForm);
        teacherPasswordInput.addEventListener('input', checkStudentForm);

        startBtn.onclick = async function() {
            errorMsg.innerText = '';
            if (currentRole === 'student') {
                const name = studentName.value.trim();
                const classCode = studentCode.value.trim().toUpperCase();
                if (!name) { errorMsg.innerText = 'Введите ФИО'; return; }
                if (!classCode) { errorMsg.innerText = 'Введите код класса'; return; }
                const foundClass = await findClassByCode(classCode);
                if (!foundClass) { errorMsg.innerText = 'Неверный код класса'; return; }
                const student = await findOrCreateStudent(name, classCode, foundClass.id, foundClass.teacher_id);
                if (!student) { errorMsg.innerText = 'Ошибка создания ученика'; return; }
                currentStudent = student;
                diagnosticResults = student.results || [];
                
                AIAnalytics.reset();
                
                document.getElementById('startScreen').classList.add('hidden');
                document.getElementById('gameScreen').classList.remove('hidden');
                currentSceneId = "1";
                loadScene();
            } else {
                const login = teacherLoginInput.value.trim();
                const password = teacherPasswordInput.value.trim();
                if (login !== TEACHER_LOGIN || password !== TEACHER_PASSWORD) { errorMsg.innerText = 'Неверный логин или пароль'; return; }
                let teacher = await loadTeacher(login);
                if (!teacher) teacher = await createTeacher(login, 'Учитель');
                if (!teacher) { errorMsg.innerText = 'Ошибка создания учителя'; return; }
                currentTeacher = teacher;
                const classes = await loadClasses(teacher.id);
                currentTeacher.classes = classes;
                currentTeacher.currentClassId = classes.length > 0 ? classes[0].id : null;
                currentClassId = currentTeacher.currentClassId;
                document.getElementById('startScreen').classList.add('hidden');
                document.getElementById('teacherScreen').classList.remove('hidden');
                await updateTeacherUI();
            }
        };
    });
    </script>
</body>
